name: Daily Market Scanner

on:
  schedule:
    # Run at 12:30 UTC (6:00 PM IST) Monday-Friday
    - cron: '30 12 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Market Scanner
      run: python scanner.py

    - name: Commit and push updated market data
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add frontend/public/market_data.json
        git add fundamentals_cache.json || true
        git add data/ || true
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated end-of-day scanner run" && git push)
