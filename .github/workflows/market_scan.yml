name: Daily Market Scan

on:
  schedule:
    # Run at 10:30 UTC which is 4:00 PM IST (after Indian market closes)
    - cron: '30 10 * * 1-5'
  workflow_dispatch: # Allow manual triggers

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Market Scanner
        run: python scanner.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add frontend/public/market_data.json
          git commit -m "Auto-update market data [skip ci]" || echo "No changes to commit"
          git push
